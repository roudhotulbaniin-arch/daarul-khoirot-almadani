<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran - Daarul Khoirot Almadani</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    
    <style>
        /* --- 1. VARIABEL & DASAR --- */
        :root {
            --primary-color: #1a5d1a;
            --gold-light: #f4ce14;
            --border-color: #ddd;
            --white: #ffffff;
            --bg-light: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- 2. HEADER (SESUAI INDEX) --- */
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 0 20px;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-sizing: border-box;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo img { height: 40px; }
        
        .logo h1 {
            font-size: 1.2rem;
            margin: 0;
            white-space: nowrap;
        }

        /* --- 3. CONTAINER & TABS --- */
        .container { 
            width: 100%;
            max-width: 1100px; 
            margin: 90px auto 40px; /* Jarak dari header fix */
            padding: 0 15px; 
            box-sizing: border-box;
        }

        .tab-container { 
            background: var(--white); 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }

        .tab-menu { 
            display: flex; 
            background: var(--bg-light); 
            border-bottom: 3px solid #eee; 
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch;
        }

        .tab-link { 
            flex: 1; 
            padding: 18px 10px; 
            border: none; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 1rem; 
            color: #555; 
            background-color: #f1f1f1;
            text-align: center; 
            transition: 0.3s; 
            text-transform: uppercase; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 5px; 
            min-width: 130px;
        }

        .tab-link.active { 
            background-color: #28a745 !important; 
            color: var(--white) !important; 
        }

        /* --- 4. TAB CONTENT & GRID (3 KOLOM) --- */
        .tab-content { 
            display: none; 
            padding: 30px; 
            background-color: var(--white);
            animation: fadeEffect 0.4s;
        }

        .tab-content.active { 
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            gap: 20px; 
        }

        @keyframes fadeEffect {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 5. FORM ELEMENTS --- */
        .form-section-title { 
            grid-column: span 6; 
            margin: 10px 0 10px; 
            padding-bottom: 8px; 
            border-bottom: 2px solid #eee; 
            color: var(--primary-color);
            font-weight: 700; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            text-transform: uppercase;
        }

        .form-group { 
            grid-column: span 2; /* 3 Kolom di Laptop */
            display: flex;
            flex-direction: column;
        }

        .form-group.wide { grid-column: span 3; } /* 2 Kolom */
        .form-group.full { grid-column: span 6; } /* 1 Kolom */

        .form-group label { 
            margin-bottom: 8px; 
            font-weight: 600; 
            font-size: 0.85rem; 
            color: var(--primary-color); 
        }

        .label-wajib::after { content: " *"; color: #e74c3c; }

        /* INPUT DENGAN IKON */
        .input-ikon {
            display: flex; 
            align-items: center; 
            background: var(--white); 
            border: 1.5px solid var(--border-color);
            border-radius: 8px; 
            padding: 0 12px; 
            min-height: 48px; 
            box-sizing: border-box;
        }

        .input-ikon i { 
            color: var(--primary-color); 
            width: 20px; 
            text-align: center; 
            margin-right: 10px; 
            flex-shrink: 0;
        }

        .input-ikon input, .input-ikon select { 
            flex: 1; 
            border: none; 
            outline: none; 
            background: transparent; 
            height: 100%; 
            font-size: 0.95rem;
        }

        /* --- 6. BUTTONS --- */
        .button-group {
            grid-column: span 6;
            display: flex; 
            gap: 15px; 
            margin-top: 20px; 
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .btn-nav { 
            flex: 1; 
            padding: 15px; 
            border: none; 
            border-radius: 8px; 
            font-weight: 800;
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 10px; 
            font-size: 1.1rem; 
            transition: 0.3s; 
            color: white; 
        }

        .btn-prev { background-color: var(--gold-light) !important; color: #333 !important; }
        .btn-next { background-color: var(--primary-color) !important; }

        /* --- 7. WHATSAPP GLOW --- */
        .wa-float {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 1000;
            transition: 0.3s;
        }

        .wa-float i {
            color: #25d366; 
            font-size: 55px;
            filter: drop-shadow(0 0 5px rgba(37, 211, 102, 0.5));
            animation: wa-glow 2s infinite alternate;
        }

        @keyframes wa-glow {
            from { filter: drop-shadow(0 0 5px rgba(37, 211, 102, 0.4)); transform: scale(1); }
            to { filter: drop-shadow(0 0 15px rgba(37, 211, 102, 0.8)); transform: scale(1.08); }
        }

        /* --- 8. RESPONSIF HP --- */
        @media (max-width: 768px) {
            header { height: 65px; padding: 0 10px; }
            .logo img { height: 35px; }
            .logo h1 { font-size: 0.95rem; white-space: nowrap; gap: 5px; }
            
            .container { margin-top: 80px; padding: 0 10px; }
            
            .tab-content.active {
                display: flex !important;
                flex-direction: column;
                padding: 20px 15px;
            }

            .form-group, .form-group.wide { grid-column: span 6 !important; }
            
            .tab-link { min-width: 110px; font-size: 0.8rem; }
            
            .wa-float i { font-size: 45px; }
            input, select { font-size: 16px !important; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="logo.png" alt="Logo"> <h1>DAARUL KHOIROT ALMADANI</h1>
    </div>
    <div style="background: var(--gold-light); color: var(--primary-color); padding: 5px 12px; border-radius: 4px; font-weight: bold; font-size: 0.8rem;">
        <i class="fas fa-bars"></i> MENU
    </div>
</header>

<div class="container">
    <div class="tab-container">
        <div class="tab-menu">
            <button class="tab-link active" onclick="openTab(event, 'santri')">
                <i class="fas fa-user-graduate"></i> DATA SANTRI
            </button>
            <button class="tab-link" onclick="openTab(event, 'ortu')">
                <i class="fas fa-users"></i> ORANG TUA
            </button>
            <button class="tab-link" onclick="openTab(event, 'alamat')">
                <i class="fas fa-map-marked-alt"></i> ALAMAT
            </button>
            <button class="tab-link" onclick="openTab(event, 'pernyataan')">
                <i class="fas fa-file-signature"></i> PERNYATAAN
            </button>
        </div>

        <div id="santri" class="tab-content active">
            <h3 class="form-section-title"><i class="fas fa-id-card"></i> Identitas Santri</h3>
            
            <div class="form-group">
                <label class="label-wajib">Tanggal Pendaftaran</label>
                <div class="input-ikon">
                    <i class="fas fa-calendar-alt"></i>
                    <input type="date" required>
                </div>
            </div>

            <div class="form-group">
                <label class="label-wajib">Nama Lengkap</label>
                <div class="input-ikon">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Sesuai KK/Akte" required>
                </div>
            </div>

            <div class="form-group">
                <label class="label-wajib">Pilihan Unit</label>
                <div class="input-ikon">
                    <i class="fas fa-school"></i>
                    <select required>
                        <option value="">-- Pilih --</option>
                        <option>Unit A</option>
                        <option>Unit B</option>
                    </select>
                </div>
            </div>

            <div class="form-group wide">
                <label class="label-wajib">NIK Santri</label>
                <div class="input-ikon">
                    <i class="fas fa-fingerprint"></i>
                    <input type="number" placeholder="16 Digit NIK" required>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-nav btn-next" onclick="nextTab('ortu')">
                    LANJUT <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>

        <div id="ortu" class="tab-content">
            <h3 class="form-section-title">Data Orang Tua</h3>
            <div class="button-group">
                <button class="btn-nav btn-prev" onclick="nextTab('santri')">KEMBALI</button>
                <button class="btn-nav btn-next" onclick="nextTab('alamat')">LANJUT</button>
            </div>
        </div>
        
        </div>
</div>

<a href="https://wa.me/628123456789" class="wa-float" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

<script>
    function openTab(evt, tabName) {
        var i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = "none";
            tabcontent[i].classList.remove("active");
        }
        tablinks = document.getElementsByClassName("tab-link");
        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(" active", "");
        }
        document.getElementById(tabName).style.display = "grid";
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.className += " active";
        
        // Fix untuk mobile flex
        if (window.innerWidth <= 768) {
            document.getElementById(tabName).style.display = "flex";
        }
    }

    function nextTab(tabName) {
        const targetBtn = Array.from(document.querySelectorAll('.tab-link')).find(btn => 
            btn.getAttribute('onclick').includes(tabName)
        );
        targetBtn.click();
        window.scrollTo(0, 0);
    }
</script>

</body>
</html>
