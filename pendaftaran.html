<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daarul Khoirot Almadani | Pendaftaran</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #1a5319;
            --primary-dark: #0d2e0d;
            --gold-color: #D4AF37;
            --gold-light: #f4ce14;
            --white: #FFFFFF;
            --bg-body: #f4f7f6;
            --text-dark: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Quicksand', sans-serif; }

        body { 
            background-color: var(--bg-body); 
            color: var(--text-dark); 
            overflow-x: hidden; /* Mencegah geser horizontal seluruh halaman */
        }

        /* --- HEADER --- */
        header {
            background: var(--primary-color);
            color: white;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { display: flex; align-items: center; gap: 8px; }
        .logo img { height: 35px; }
        .logo h1 { font-size: 0.95rem; font-weight: 700; color: white; }

        #menu-toggle {
            background: var(--gold-light);
            color: var(--primary-color);
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.8rem;
        }

        /* --- TAB NAVIGATION (PENTING: AGAR FIT DI HP) --- */
        .tab-menu { 
            display: flex; 
            background: #e0e0e0; 
            width: 100%;
            justify-content: space-between; /* Distribusi rata */
        }

        .tab-link {
            flex: 1; /* Setiap tab mengambil ruang yang sama */
            padding: 12px 5px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.7rem; /* Ukuran font diperkecil untuk HP */
            color: #555;
            background: #eee;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            text-align: center;
            border-right: 1px solid #ddd;
        }

        .tab-link i { font-size: 1.1rem; }
        .tab-link.active {
            background: var(--primary-color);
            color: white;
        }
        .tab-link:last-child { border-right: none; }

        /* --- CONTENT --- */
        .container { width: 100%; max-width: 1200px; margin: 0 auto; }
        
        .tab-container {
            background: white;
            min-height: 80vh;
        }

        .tab-content { display: none; padding: 20px 15px; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .form-section-title {
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 2px solid #f0f0f0;
            color: var(--primary-color);
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr; /* Default 1 kolom untuk mobile */
            gap: 15px;
        }

        @media (min-width: 769px) {
            .form-grid { grid-template-columns: 1fr 1fr; }
            .tab-link { font-size: 0.9rem; padding: 20px; }
            .tab-link i { font-size: 1.4rem; }
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .required::after { content: " *"; color: #e74c3c; }

        .input-ikon {
            display: flex;
            align-items: center;
            border: 1.5px solid #ccc;
            border-radius: 8px;
            padding: 0 10px;
            height: 45px;
        }
        .input-ikon i { color: var(--primary-color); width: 20px; margin-right: 10px; font-size: 0.9rem; }
        .input-ikon input, .input-ikon select {
            flex: 1; border: none; outline: none; background: transparent; width: 100%; font-size: 0.9rem;
        }

        /* --- PERNYATAAN --- */
        .pernyataan-box {
            background: #f1f8f1;
            border: 1.5px dashed #2e7d32;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
        }
        .pernyataan-text { font-size: 0.9rem; line-height: 1.5; margin-bottom: 15px; color: #1b5e20; }
        .checkbox-wrapper { display: flex; align-items: flex-start; gap: 10px; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
        .checkbox-wrapper input { margin-top: 3px; width: 18px; height: 18px; }

        /* --- BUTTONS --- */
        .btn-nav {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-next { background: var(--primary-color); }
        .btn-prev { background: #7f8c8d; }
        .btn-submit { background: #1a5319; border: 2px solid #0d2e0d; }

        /* --- WHATSAPP FLOAT --- */
        .whatsapp-float {
            position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white !important;
            padding: 10px 15px; border-radius: 50px; display: flex; align-items: center; gap: 8px;
            text-decoration: none; font-weight: bold; font-size: 0.85rem; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        footer { background: var(--primary-dark); color: white; padding: 25px 15px; text-align: center; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="https://via.placeholder.com/40" alt="Logo">
        <h1>DAARUL KHOIROT</h1>
    </div>
    <button id="menu-toggle">Menu</button>
</header>

<div class="container">
    <div class="tab-container">
        <!-- Tab Menu: Dibuat Flexbox agar pas di layar HP -->
        <div class="tab-menu">
            <button type="button" class="tab-link active" onclick="goToTab(0)">
                <i class="fas fa-user"></i>
                <span>SANTRI</span>
            </button>
            <button type="button" class="tab-link" onclick="goToTab(1)">
                <i class="fas fa-users"></i>
                <span>ORTU</span>
            </button>
            <button type="button" class="tab-link" onclick="goToTab(2)">
                <i class="fas fa-map"></i>
                <span>ALAMAT</span>
            </button>
            <button type="button" class="tab-link" onclick="goToTab(3)">
                <i class="fas fa-check"></i>
                <span>SAY</span>
            </button>
        </div>

        <form id="formPendaftaran">
            <!-- TAB 1: DATA SANTRI -->
            <div id="tab-0" class="tab-content active">
                <div class="form-section-title">Identitas Santri</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="required">Tanggal Daftar</label>
                        <div class="input-ikon"><i class="fas fa-calendar"></i><input type="date" required></div>
                    </div>
                    <div class="form-group">
                        <label class="required">Nama Lengkap</label>
                        <div class="input-ikon"><i class="fas fa-user"></i><input type="text" placeholder="Sesuai KK" required></div>
                    </div>
                    <div class="form-group">
                        <label class="required">Unit & Kelas</label>
                        <div class="input-ikon">
                            <i class="fas fa-school"></i>
                            <select required>
                                <option value="">-- Pilih --</option>
                                <option>TPQ</option>
                                <option>Madrasah</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="required">NIK (16 Digit)</label>
                        <div class="input-ikon"><i class="fas fa-id-card"></i><input type="number" placeholder="NIK" required></div>
                    </div>
                </div>
                <button type="button" class="btn-nav btn-next" onclick="goToTab(1)">Lanjut <i class="fas fa-arrow-right"></i></button>
            </div>

            <!-- TAB 2: DATA ORANG TUA -->
            <div id="tab-1" class="tab-content">
                <div class="form-section-title">Data Orang Tua</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="required">Nama Ayah</label>
                        <div class="input-ikon"><i class="fas fa-male"></i><input type="text" placeholder="Nama Ayah"></div>
                    </div>
                    <div class="form-group">
                        <label class="required">Nama Ibu</label>
                        <div class="input-ikon"><i class="fas fa-female"></i><input type="text" placeholder="Nama Ibu"></div>
                    </div>
                    <div class="form-group">
                        <label>No. HP (WhatsApp)</label>
                        <div class="input-ikon"><i class="fab fa-whatsapp"></i><input type="tel" placeholder="08xxxx"></div>
                    </div>
                </div>
                <button type="button" class="btn-nav btn-next" onclick="goToTab(2)">Lanjut <i class="fas fa-arrow-right"></i></button>
                <button type="button" class="btn-nav btn-prev" onclick="goToTab(0)">Kembali</button>
            </div>

            <!-- TAB 3: DATA ALAMAT -->
            <div id="tab-2" class="tab-content">
                <div class="form-section-title">Alamat Lengkap</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="required">Alamat</label>
                        <div class="input-ikon"><i class="fas fa-home"></i><input type="text" placeholder="Jl/Dusun/RT/RW"></div>
                    </div>
                    <div class="form-group">
                        <label class="required">Desa/Kelurahan</label>
                        <div class="input-ikon"><i class="fas fa-map-marker-alt"></i><input type="text" placeholder="Nama Desa"></div>
                    </div>
                    <div class="form-group">
                        <label class="required">Kecamatan</label>
                        <div class="input-ikon"><i class="fas fa-city"></i><input type="text" placeholder="Kecamatan"></div>
                    </div>
                </div>
                <button type="button" class="btn-nav btn-next" onclick="goToTab(3)">Terakhir <i class="fas fa-arrow-right"></i></button>
                <button type="button" class="btn-nav btn-prev" onclick="goToTab(1)">Kembali</button>
            </div>

            <!-- TAB 4: PERNYATAAN -->
            <div id="tab-3" class="tab-content">
                <div class="form-section-title">Pernyataan</div>
                <div class="pernyataan-box">
                    <p class="pernyataan-text">
                        Saya menyatakan bahwa seluruh data yang diisi adalah benar.
                    </p>
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="agree_check" required>
                        <span>Saya Menyetujui Seluruh Pernyataan</span>
                    </label>
                </div>
                <button type="submit" class="btn-nav btn-next btn-submit">
                    <i class="fas fa-paper-plane"></i> SIMPAN & KIRIM WA
                </button>
                <button type="button" class="btn-nav btn-prev" onclick="goToTab(2)">Kembali</button>
            </div>
        </form>
    </div>
</div>

<a href="https://wa.me/628123456789" class="whatsapp-float">
    <i class="fab fa-whatsapp"></i> <span>Tanya Admin</span>
</a>

<footer>
    <p>&copy; 2026 Daarul Khoirot Almadani</p>
</footer>

<script>
    function goToTab(index) {
        // Hilangkan semua tab content
        const contents = document.querySelectorAll('.tab-content');
        contents.forEach(content => content.classList.remove('active'));
        
        // Hilangkan status active di semua tombol tab
        const links = document.querySelectorAll('.tab-link');
        links.forEach(link => link.classList.remove('active'));
        
        // Aktifkan yang dipilih
        document.getElementById('tab-' + index).classList.add('active');
        links[index].classList.add('active');
        
        // Scroll ke atas otomatis
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.getElementById('formPendaftaran').onsubmit = function(e) {
        e.preventDefault();
        if(!document.getElementById('agree_check').checked) {
            alert("Centang persetujuan!");
            return;
        }
        alert("Berhasil! Mengarahkan ke WhatsApp...");
        // Simulasi pengiriman
    };
</script>

</body>
</html>
