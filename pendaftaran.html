<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran | Daarul Khoirot Almadani</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/browser-image-compression/2.0.2/browser-image-compression.min.js"></script>
  
    <style>
        /* --- 1. DASAR & VARIABEL --- */
        :root {
            --primary-color: #1a5319;
            --primary-dark: #0d2e0d;
            --gold-color: #D4AF37;
            --gold-light: #f4ce14;
            --white: #FFFFFF;
            --bg-body: #f4f7f6;
            --text-dark: #1a1a1a;
            --border-color: #1a5d1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Quicksand', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-dark); min-height: 100vh; display: flex; flex-direction: column; }

        /* --- 2. HEADER & NAVIGASI --- */
        header {
            background: var(--primary-color);
            color: white;
            padding: 10px 4%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo img { height: 40px; }
        .logo h1 { font-size: 1.2rem; font-weight: 700; color: white; }
        
        nav ul { list-style: none; display: flex; gap: 15px; }
        nav ul li a { color: white; text-decoration: none; font-weight: 600; font-size: 0.9rem; padding: 5px 10px; transition: 0.3s; }
        nav ul li a:hover, nav ul li a.active { color: var(--gold-light); border-bottom: 2px solid var(--gold-light); }
        #menu-toggle { display: none; background: var(--gold-light); color: var(--primary-color); border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; }

        /* --- 3. FORM & TABS --- */
        .container { padding: 2rem 5%; flex: 1; max-width: 1100px; margin: 0 auto; width: 100%; }
        .tab-container { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .tab-menu { display: flex; background: #f8f9fa; border-bottom: 3px solid #eee; overflow-x: auto; }
        .tab-link { 
            flex: 1; padding: 18px 10px; border: none; cursor: pointer; font-weight: 700; 
            color: var(--primary-color); background: #f1f1f1; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 0.8rem;
        }
        .tab-link.active { background-color: var(--primary-color) !important; color: white !important; }

        .tab-content { display: none; padding: 30px; animation: fadeIn 0.4s; }
        .tab-content.active { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }

        /* --- 4. FORM ELEMENTS --- */
        .form-section-title { 
            grid-column: 1 / -1; margin: 15px 0 10px; padding-bottom: 8px; 
            border-bottom: 2px solid #eee; color: var(--primary-color); font-weight: 700;
            text-transform: uppercase; display: flex; align-items: center; gap: 10px;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.85rem; color: var(--primary-color); }
        .required::after { content: " *"; color: #d63031; }

        .input-ikon {
            display: flex; align-items: center; background: white; 
            border: 1.5px solid var(--border-color); border-radius: 8px; padding: 0 12px; min-height: 48px;
        }
        .input-ikon i { color: var(--primary-color); width: 20px; margin-right: 10px; }
        .input-ikon input, .input-ikon select { flex: 1; border: none; outline: none; background: transparent; height: 100%; width: 100%; font-size: 0.9rem; }
        
        /* State Form */
        input[readonly], select:disabled { background-color: #f8f9fa !important; cursor: not-allowed; opacity: 0.7; }

        /* --- 5. BUTTONS & FOOTER --- */
        .button-group { grid-column: 1 / -1; display: flex; gap: 15px; margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
        .btn-nav { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; font-size: 1.1rem; transition: 0.3s; color: white; }
        .btn-prev { background-color: var(--gold-light); }
        .btn-next { background-color: var(--primary-color); }
        .btn-full { width: 100%; }

        footer { background: var(--primary-dark); color: white; padding: 40px 5% 20px; text-align: center; margin-top: 40px; }
        .whatsapp-float { position: fixed; bottom: 25px; right: 25px; background: #25d366; color: white; padding: 12px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; z-index: 999; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- 6. MOBILE RESPONSIVE --- */
        @media (max-width: 768px) {
            #menu-toggle { display: block; }
            nav ul { display: none; flex-direction: column; position: absolute; top: 60px; left: 0; width: 100%; background: var(--primary-color); padding: 20px; }
            nav.show ul { display: flex; }
            .tab-link span { display: none; }
            .tab-content { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="main_logo.png" alt="Logo">
        <h1>DAARUL KHOIROT</h1>
    </div>
    <button id="menu-toggle"><i class="fas fa-bars"></i></button>
    <nav>
        <ul>
            <li><a href="index.html">Beranda</a></li>
            <li><a href="pendaftaran.html" class="active">Pendaftaran</a></li>
            <li><a href="kontak.html">Kontak</a></li>
        </ul>
    </nav>
</header>

<div class="container">
    <form id="formPendaftaran">
        <div class="tab-container">
            <div class="tab-menu">
                <button type="button" class="tab-link active" onclick="openTab(event, 'santri')">
                    <i class="fas fa-user-graduate"></i> DATA SANTRI
                </button>
                <button type="button" class="tab-link" onclick="openTab(event, 'ortu')">
                    <i class="fas fa-users"></i> DATA ORANG TUA
                </button>
                <button type="button" class="tab-link" onclick="openTab(event, 'alamat')">
                    <i class="fas fa-city"></i> ALAMAT
                </button>
                <button type="button" class="tab-link" onclick="openTab(event, 'pernyataan')">
                    <i class="fas fa-file-signature"></i> PERNYATAAN
                </button>
            </div>

            <div id="santri" class="tab-content active">
                <div class="form-section-title"><i class="fas fa-id-card"></i> Identitas Santri</div>
                <div class="form-group">
                    <label class="required">Nama Lengkap</label>
                    <div class="input-ikon"><i class="fas fa-user"></i><input type="text" name="nama_santri" placeholder="Sesuai KK"></div>
                </div>
                <div class="form-group">
                    <label class="required">NIK (16 Digit)</label>
                    <div class="input-ikon"><i class="fas fa-fingerprint"></i><input type="text" name="nik" maxlength="16" oninput="this.value=this.value.replace(/[^0-9]/g,'')"></div>
                </div>
                <div class="form-group">
                    <label class="required">Pilihan Unit</label>
                    <div class="input-ikon">
                        <i class="fas fa-graduation-cap"></i>
                        <select name="tingkat_unit">
                            <option value="">-- Pilih --</option>
                            <option>TPQ - Tingkat 1</option>
                            <option>MDT - Tingkat 1</option>
                            <option>Pesantren Tahun 1</option>
                        </select>
                    </div>
                </div>
                <div class="button-group">
                    <button type="button" class="btn-nav btn-next btn-full" onclick="nextTab('ortu')">Lanjut <i class="fas fa-arrow-right"></i></button>
                </div>
            </div>

            <div id="ortu" class="tab-content">
                <div class="form-section-title"><i class="fas fa-user-tie"></i> Data Ayah</div>
                <div class="form-group">
                    <label class="required">Nama Ayah</label>
                    <div class="input-ikon"><i class="fas fa-user"></i><input type="text" name="nama_ayah"></div>
                </div>
                <div class="form-group">
                    <label class="required">WhatsApp Ayah</label>
                    <div class="input-ikon"><i class="fab fa-whatsapp"></i><input type="text" name="hp_ayah" placeholder="628..."></div>
                </div>
                <div class="form-section-title"><i class="fas fa-user-nurse"></i> Data Ibu</div>
                <div class="form-group">
                    <label class="required">Nama Ibu</label>
                    <div class="input-ikon"><i class="fas fa-user"></i><input type="text" name="nama_ibu"></div>
                </div>
                <div class="button-group">
                    <button type="button" class="btn-nav btn-prev" onclick="prevTab('santri')">Kembali</button>
                    <button type="button" class="btn-nav btn-next" onclick="nextTab('alamat')">Lanjut</button>
                </div>
            </div>

            <div id="alamat" class="tab-content">
                <div class="form-section-title"><i class="fas fa-map-marker-alt"></i> Lokasi Domisili</div>
                <div class="form-group" style="grid-column: 1/-1;">
                    <label>Alamat Lengkap</label>
                    <div class="input-ikon"><i class="fas fa-road"></i><input type="text" name="al_ayah" placeholder="Jalan/Kampung..."></div>
                </div>
                <div class="button-group">
                    <button type="button" class="btn-nav btn-prev" onclick="prevTab('ortu')">Kembali</button>
                    <button type="button" class="btn-nav btn-next" onclick="nextTab('pernyataan')">Lanjut</button>
                </div>
            </div>

            <div id="pernyataan" class="tab-content">
                <div class="form-section-title"><i class="fas fa-check-double"></i> Konfirmasi</div>
                <div style="grid-column: 1/-1; background: #e8f5e9; padding: 20px; border-radius: 10px; border: 1px dashed #1a5d1a;">
                    <input type="checkbox" name="cek_pernyataan" id="cek_pernyataan">
                    <label for="cek_pernyataan" style="font-weight: bold; cursor: pointer;"> Saya menyetujui seluruh aturan lembaga.</label>
                </div>
                <div class="button-group">
                    <button type="button" onclick="handleFormSubmit()" class="btn-nav btn-next"><i class="fas fa-save"></i> Simpan & Kirim WA</button>
                </div>
            </div>
        </div>
    </form>
</div>

<footer>
    <p>© 2025 DAARUL KHOIROT ALMADANI. Jatisari, Karawang.</p>
</footer>

<a href="https://wa.me/6281401643188" class="whatsapp-float" target="_blank">
    <i class="fab fa-whatsapp"></i> <span>Tanya Admin</span>
</a>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBUd34AXvnBkUMaciculMQLLRRAPkxf-6o",
        authDomain: "daarul-khoirot-pendaftaran.firebaseapp.com",
        projectId: "daarul-khoirot-pendaftaran",
        storageBucket: "daarul-khoirot-pendaftaran.firebasestorage.app",
        messagingSenderId: "963910462284",
        appId: "1:963910462284:web:17de15dc5d2481b20b3de9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Fungsi Submit Global
    window.handleFormSubmit = async () => {
        const form = document.getElementById('formPendaftaran');
        const isAgreed = document.getElementById('cek_pernyataan').checked;

        if(!isAgreed) {
            return Swal.fire('Peringatan', 'Harap centang persetujuan!', 'warning');
        }

        Swal.fire({ title: 'Menyimpan...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        try {
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            data.waktu_simpan = new Date().toISOString();

            await addDoc(collection(db, "pendaftaran_santri"), data);
            
            Swal.fire('Berhasil!', 'Data tersimpan. Membuka WhatsApp...', 'success').then(() => {
                kirimWA(data);
                location.reload();
            });
        } catch (e) {
            Swal.fire('Gagal', e.message, 'error');
        }
    };

    function kirimWA(data) {
        let msg = `*PENDAFTARAN SANTRI BARU*\nNama: ${data.nama_santri}\nUnit: ${data.tingkat_unit}\nStatus: Terkirim via Web`;
        window.open(`https://wa.me/6281401643188?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>

<script>
    // Tab Navigation Logic
    function openTab(evt, tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
        document.getElementById(tabId).style.display = 'grid';
        if(evt) evt.currentTarget.classList.add('active');
        window.scrollTo(0, 0);
    }

    function nextTab(id) { 
        // Tambahkan validasi input di sini jika perlu
        openTab(null, id);
        const btn = document.querySelector(`.tab-link[onclick*="${id}"]`);
        if(btn) {
            document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
            btn.classList.add('active');
        }
    }

    function prevTab(id) { openTab(null, id); }

    // Mobile Menu Toggle
    document.getElementById('menu-toggle').onclick = () => {
        document.querySelector('nav').classList.toggle('show');
    };
</script>

</body>
</html>
